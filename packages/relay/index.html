<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Yeshie HUD</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'SF Mono',Monaco,monospace;background:#0d1117;color:#c9d1d9;font-size:13px;padding:16px}
header{display:flex;align-items:center;gap:10px;margin-bottom:16px;border-bottom:1px solid #21262d;padding-bottom:10px}
header h1{font-size:15px;color:#58a6ff;font-weight:600}
#dot{width:8px;height:8px;border-radius:50%;background:#f85149;flex-shrink:0}
#dot.ok{background:#3fb950}
#lbl{font-size:11px;color:#8b949e}
#clk{margin-left:auto;color:#484f58;font-size:11px}
table{width:100%;border-collapse:collapse}
th{text-align:left;color:#8b949e;font-size:11px;font-weight:500;padding:6px 10px;border-bottom:1px solid #21262d;white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid #161b22;vertical-align:top}
tr:hover td{background:#161b22}
.jid{color:#8b949e;font-size:11px}
.ses{color:#c9d1d9;font-weight:500}
.dsc{color:#8b949e;font-size:11px}
.st{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;white-space:nowrap}
.s-running  {background:#2d2101;color:#d29922;border:1px solid #3d2e01}
.s-notified {background:#0d1b2e;color:#58a6ff;border:1px solid #1f3152}
.s-blocked  {background:#2d1200;color:#ff7b00;border:1px solid #5a2600;animation:pulse 1.5s ease-in-out infinite}
.s-acked,.s-done{background:#0d2415;color:#3fb950;border:1px solid #1a4327}
.s-error    {background:#2d0d0d;color:#f85149;border:1px solid #5a1a1a}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.el{color:#c9d1d9;white-space:nowrap}
.msg{color:#8b949e;font-size:11px;max-width:280px;word-break:break-word}
.ts{color:#8b949e;font-size:11px;white-space:nowrap}
#empty{text-align:center;color:#484f58;padding:48px;font-size:14px}
</style>
</head>
<body>
<header>
  <div id="dot"></div>
  <h1>Yeshie HUD</h1>
  <span id="lbl">connecting…</span>
  <span id="clk"></span>
</header>
<div id="content"><div id="empty">No jobs in flight</div></div>
<script src="/socket.io/socket.io.js"></script>
<script>
const dot=document.getElementById('dot'),lbl=document.getElementById('lbl'),
      content=document.getElementById('content'),clk=document.getElementById('clk');
let jobs=[];
const socket=io({reconnectionDelay:1000,reconnectionDelayMax:30000});
socket.on('connect',()=>{
  dot.classList.add('ok'); lbl.textContent='connected';
  fetch('/jobs').then(r=>r.json()).then(d=>{jobs=d.jobs||[];render();});
});
socket.on('disconnect',()=>{ dot.classList.remove('ok'); lbl.textContent='disconnected — reconnecting…'; });
socket.on('hud_update',d=>{jobs=d.jobs||[];render();});
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtEl(ms){const s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60);
  return h>0?`${h}h ${m%60}m`:m>0?`${m}m ${s%60}s`:`${s}s`;}
function fmtTs(ts){return new Date(ts).toLocaleTimeString('en-US',{hour12:false});}
const SL={running:'● running',notified:'◎ notified',blocked:'⚠ BLOCKED',acked:'✓ acked',done:'✓ done',error:'✗ error'};
function render(){
  if(!jobs||!jobs.length){content.innerHTML='<div id="empty">No jobs in flight</div>';return;}
  const now=Date.now();
  content.innerHTML='<table><thead><tr><th>JOB ID</th><th>SESSION</th><th>STATUS</th><th>ELAPSED</th><th>LAST MSG</th><th>UPDATED</th></tr></thead><tbody>'+
    jobs.map(j=>`<tr>
      <td><span class="jid">${esc(j.job_id)}</span></td>
      <td><div class="ses">${esc(j.session_title)}</div><div class="dsc">${esc(j.description||'')}</div></td>
      <td><span class="st s-${j.status}">${SL[j.status]||j.status}</span></td>
      <td class="el" data-s="${j.started_at}">${fmtEl(now-j.started_at)}</td>
      <td class="msg">${esc(j.message||'')}</td>
      <td class="ts">${fmtTs(j.updated_at)}</td>
    </tr>`).join('')+'</tbody></table>';
}
setInterval(()=>{
  const now=Date.now();
  clk.textContent=new Date().toLocaleTimeString('en-US',{hour12:false});
  document.querySelectorAll('.el[data-s]').forEach(el=>{el.textContent=fmtEl(now-+el.dataset.s);});
},1000);
</script>
</body>
</html>
